# PID Provider conformance profile — copy or merge into config.ini
# Usage: wct test:issuance --file-ini config.pid-provider.ini

[issuance]
# B1-7.1: Set this to the test environment URL of the PID Provider.
# Example: https://idserver.servizicie.interno.gov.it/cidp-dev (placeholder)
url = https://pid-provider-test.example
credential_types[] = dc_sd_jwt_PersonIdentificationData

[issuance_pid]
# CieID LoA High (L3) — CI_051 happy path (no MRTD PoP steps)
#
# B1-7.1 test-mode rules:
#  - mock_mrtd_enabled = true (default when mode != none): the tool mints a
#    synthetic CIE+PIN ID Token and POSTs it to the PID Provider's eID callback
#    endpoint instead of performing real CIE+PIN authentication.
#  - The PID Provider SUT must be deployed with test mode that:
#    (a) skips signature verification on the mock ID Token (ephemeral key),
#    (b) accepts the id_token POST at its eID callback URL.
#  - ICAO trust validation must be disabled on the SUT for mode = l3
#    (no MRTD PoP steps are executed in L3).
mode = l3
given_name = Mario
family_name = Rossi
tax_id_code = RSSMRA80A10H501Z
birthdate = 1980-01-10
place_of_birth = Roma
nationalities[] = IT
# mock_mrtd_enabled defaults to true when mode != none; set explicitly to override:
# mock_mrtd_enabled = true

# Optional — CI_053 (only assert when the SUT requests contact details)
# email = mario.rossi@example.it
# phone_number = +390612345678

# --- L2+ MRTD PoP profile (uncomment and set mode = l2plus) ---
# mode = l2plus
# personal_administrative_number = XX00000XX
# mrz = IDITARSSMRA80A10H501Z<<<<<<<<<<<<<<<
# mock_mrtd_enabled = true
